; ROSS ESP32-CAM Firmware
; Build:   pio run           (reads WiFi creds from ../.env)
; Flash:   uv run python ross/flash.py firmware/.pio/build/esp32cam/firmware.bin
;
; First-time setup:  make setup-env   (from repo root)

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino

monitor_speed = 115200
upload_speed = 460800

; Serial port for direct USB upload (not used with ross/flash.py)
; upload_port = /dev/ttyAMA0

extra_scripts = pre:load_env.py

build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=1
